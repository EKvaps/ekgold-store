<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EKVAPS Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }

        header {
            background: black;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            border-bottom: 1px solid #222;
        }

        .productos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid #2a2a2a;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #444;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .nombre {
            font-size: 18px;
            font-weight: bold;
        }

        .detalle {
            font-size: 14px;
            color: #aaa;
            margin: 5px 0;
        }

        .precio {
            font-size: 20px;
            margin-top: 10px;
            color: #00ff88;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

<header>EKVAPS STORE</header>

<section class="productos" id="productos"></section>

<footer>© EKVAPS - Todos los derechos reservados</footer>

<script>
const productos = [
    {
        nombre: "Proximamente",
        puffs:  "??????",
        precio: "?????",
        imagen: "https://via.placeholder.com/300x200?text=Proximamente"
    }
];

const contenedor = document.getElementById("productos");

productos.forEach(producto => {
    contenedor.innerHTML += `
        <div class="card">
            <img src="${producto.imagen}" alt="${producto.nombre}">
            <div class="nombre">${producto.nombre}</div>
            <div class="detalle">${producto.puffs}</div>
            <div class="precio">$${producto.precio}</div>
        </div>
    `;
});
</script>

</body>
</html>

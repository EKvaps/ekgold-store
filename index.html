<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKGOLD</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f0f0f;
color:white;
}

/* HEADER */

header{
background:black;
padding:25px;
text-align:center;
border-bottom:2px solid #C6A75E;
}

header h1{
color:#C6A75E;
letter-spacing:4px;
font-size:32px;
}

/* FILTROS */

.filtros{
display:flex;
justify-content:center;
gap:15px;
margin:25px;
flex-wrap:wrap;
}

.filtros button{
background:#1a1a1a;
color:#C6A75E;
border:1px solid #C6A75E;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
transition:.3s;
}

.filtros button:hover{
background:#C6A75E;
color:black;
}

.filtros button.activo{
background:#C6A75E;
color:black;
}

/* BOTON CARRITO */

.carrito-btn{
position:fixed;
top:20px;
right:20px;
background:#C6A75E;
color:black;
padding:12px 18px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,.4);
transition:.3s;
z-index:1000;
}

.carrito-btn.animar{
transform:scale(1.25);
}

/* GRID */

.subtitulo{
text-align:center;
margin:40px 10px;
font-size:26px;
color:#ddd;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
max-width:1300px;
margin:auto;
}

/* PRODUCTO */

.card{
background:#1a1a1a;
border-radius:16px;
padding:20px;
text-align:center;
border:1px solid rgba(198,167,94,0.2);
transition:.3s;
box-shadow:0 10px 25px rgba(0,0,0,.4);
position:relative;
}

.card:hover{
transform:translateY(-8px);
border-color:#C6A75E;
}

.card img{
width:100%;
height:200px;
object-fit:contain;
background:#111;
border-radius:10px;
margin-bottom:15px;
}

.precio{
color:#C6A75E;
font-size:20px;
font-weight:bold;
margin:10px 0;
}

/* PROMOCION */

.precio-viejo{
text-decoration:line-through;
color:#777;
font-size:14px;
}

.precio-promo{
color:#63ff9c;
font-size:22px;
font-weight:bold;
}

.promo{
position:absolute;
top:10px;
left:10px;
background:#ff3b3b;
color:white;
padding:6px 10px;
font-size:12px;
border-radius:6px;
font-weight:bold;
}

button{
background:#C6A75E;
border:none;
padding:10px 18px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

/* MODAL SABORES */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#1a1a1a;
padding:30px;
border-radius:14px;
width:350px;
}

.sabor{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #333;
}

.disponible{
color:#63ff9c;
}

.agotado{
color:#ff6b6b;
}

/* PANEL CARRITO */

.panel-carrito{
position:fixed;
top:0;
right:-350px;
width:320px;
height:100%;
background:#111;
padding:25px;
transition:.4s;
}

.panel-carrito.abierto{
right:0;
}

.item{
margin-bottom:10px;
font-size:14px;
}

.total{
margin-top:20px;
color:#C6A75E;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<h1>EKGOLD</h1>
</header>

<div class="filtros">

<button class="activo" onclick="filtrar('todos',this)">Todos</button>
<button onclick="filtrar('vapers',this)">Vapers</button>
<button onclick="filtrar('destilados',this)">Destilados</button>
<button onclick="filtrar('libros',this)">Libros</button>

</div>

<div class="carrito-btn" id="carritoBtn">
🛒 <span id="cantidad">0</span>
</div>

<h2 class="subtitulo">Productos Disponibles</h2>

<section class="productos" id="productos"></section>

<div class="modal" id="modal">

<div class="modal-box">

<h3 id="titulo"></h3>

<div id="sabores"></div>

<br>

<button onclick="cerrarModal()">Cerrar</button>

</div>

</div>

<div class="panel-carrito" id="panel">

<h2>Tu carrito</h2>

<div id="listaCarrito">Carrito vacío</div>

<div class="total" id="total"></div>

<br>

<button onclick="comprar()">Finalizar compra</button>

</div>

<script>

const numero="573106435115"

let carrito=[]

const productos=[

{
categoria:"vapers",
nombre:"Lost Mary",
puffs:"5000",
precio:19000,
imagen:"lostmary.png",
sabores:[
{nombre:"Duo dragones kiwi Ice",stock:true},
{nombre:"Mango melocotòn sandìa",stock:true},
{nombre:"Mora cereza limon",stock:true},
{nombre:"Menta goma agria",stock:true},
{nombre:"Citrus sunrise",stock:true}
]
},

{
categoria:"vapers",
nombre:"Snoopy",
puffs:"15000",
precio:26000,
imagen:"nopy.png",
sabores:[
{nombre:"Uva Ice",stock:false},
{nombre:"Fresa Kiwi",stock:true},
{nombre:"Red juice",stock:true},
{nombre:"Bahama mama",stock:true},
{nombre:"Triple baya Ice",stock:false},
{nombre:"Arcoiris tropical",stock:true},
{nombre:"Piña colada",stock:true},
{nombre:"Fresa Melocotón menta",stock:true},
{nombre:"Fresa Ice",stock:true},
{nombre:"Cereza coke Ice",stock:true},
{nombre:"Kiwi fresa",stock:true}
]
},

{
categoria:"vapers",
nombre:"Hulk hogans",
puffs:"8000",
precio:22000,
imagen:"hulk.png",
sabores:[
{nombre:"Blue razz Ice",stock:true},
{nombre:"Triple baya",stock:true},
{nombre:"Fresa Ice",stock:true},
{nombre:"Limonada de fruta del dragon",stock:true}
]
},

{
categoria:"vapers",
nombre:"Chris brown",
puffs:"15000",
precio:30000,
imagen:"brown.png",
sabores:[
{nombre:"Pop de golpe de uva",stock:true},
{nombre:"Piña colada",stock:false},
{nombre:"Kiwi fresa",stock:false}
]
},

{
categoria:"destilados",
nombre:"AGOTADO",
puffs:"1500",
precio:36000,
imagen:"just.png",
sabores:[
{nombre:"Expreso de piña",stock:false},
{nombre:"Kraken",stock:false},
{nombre:"Fresa cough",stock:false},
{nombre:"Alien kush",stock:false}
]
},

{
categoria:"libros",
nombre:"Escritos de un corazón errante",
puffs:"",
precio:49500,
precioAntes:65000,
promo:true,
imagen:"escritos.png",
sabores:[
{nombre:"Desea añadir este producto",stock:true}
]
},

{
categoria:"vapers",
nombre:"Mtrx",
puffs:"12000",
precio:24000,
imagen:"mtrx12.png",
sabores:[
{nombre:"Mango durazno",stock:false},
{nombre:"Menta dulce cremosa",stock:true},
{nombre:"Cereza con frutos rojos acidos",stock:true},
{nombre:"Fresa Ice",stock:true},
{nombre:"Lima limon gaseosa mentol",stock:false},
{nombre:"Mora azul Ice",stock:false},
{nombre:"Uva limon",stock:true},
{nombre:"Aràndano y sandìa",stock:false},
{nombre:"Tartas de fresa",stock:true}
]
},

{
categoria:"destilados",
nombre:"Brass kanuckles",
precio:97000,
imagen:"IMG-20260402-WA0007.jpg"
}

]

function mostrarProductos(lista){

const contenedor=document.getElementById("productos")

contenedor.innerHTML=""

lista.forEach((p)=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

${p.promo ? '<div class="promo">PROMO</div>' : ''}

<img src="${p.imagen}">

<h3>${p.nombre}</h3>

<p>${p.puffs ? p.puffs+" Puffs" : "Libro"}</p>

${p.precioAntes ? `
<div class="precio-viejo">$${p.precioAntes}</div>
<div class="precio-promo">$${p.precio}</div>
` : `
<div class="precio">$${p.precio}</div>
`}

<button>Comprar</button>

`

card.querySelector("button").onclick=()=>abrirSabores(productos.indexOf(p))

contenedor.appendChild(card)

})

}

mostrarProductos(productos)

function filtrar(categoria,btn){

document.querySelectorAll(".filtros button").forEach(b=>b.classList.remove("activo"))

btn.classList.add("activo")

if(categoria=="todos"){

mostrarProductos(productos)

}else{

const filtrados=productos.filter(p=>p.categoria==categoria)

mostrarProductos(filtrados)

}

}

function abrirSabores(i){

const prod=productos[i]

if(prod.sabores.length==0){

agregar(prod.nombre,"Libro",prod.precio)
return

}

document.getElementById("titulo").innerText=prod.nombre

const lista=document.getElementById("sabores")

lista.innerHTML=""

prod.sabores.forEach(s=>{

const div=document.createElement("div")

div.className="sabor"

let estado=s.stock
?`<span class="disponible">Disponible</span>`
:`<span class="agotado">Agotado</span>`

let boton=s.stock
?`<button onclick="agregar('${prod.nombre}','${s.nombre}',${prod.precio})">Añadir</button>`
:""

div.innerHTML=`
<span>${s.nombre}</span>
${estado}
${boton}
`

lista.appendChild(div)

})

document.getElementById("modal").style.display="flex"

}

function cerrarModal(){

document.getElementById("modal").style.display="none"

}

function agregar(prod,sabor,precio){

carrito.push({prod,sabor,precio})

actualizarCarrito()

animar()

}

function actualizarCarrito(){

const lista=document.getElementById("listaCarrito")

lista.innerHTML=""

let total=0

carrito.forEach(c=>{

const div=document.createElement("div")

div.className="item"

div.innerText=`${c.prod} - ${c.sabor} - $${c.precio}`

lista.appendChild(div)

total+=c.precio

})

document.getElementById("cantidad").innerText=carrito.length

document.getElementById("total").innerText="Total: $"+total

}

function animar(){

const btn=document.getElementById("carritoBtn")

btn.classList.add("animar")

setTimeout(()=>btn.classList.remove("animar"),300)

}

document.getElementById("carritoBtn").onclick=()=>{

document.getElementById("panel").classList.toggle("abierto")

}

function comprar(){

if(carrito.length==0){

alert("Tu carrito está vacío")

return

}

let mensaje="Hola quiero comprar:%0A%0A"

carrito.forEach(c=>{

mensaje+=`${c.prod} - ${c.sabor} - $${c.precio}%0A`

})

window.open(`https://wa.me/${numero}?text=${mensaje}`)

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKGOLD</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#0f0f0f;color:white}

header{
background:black;
padding:25px;
text-align:center;
border-bottom:2px solid #C6A75E;
position:sticky;
top:0;
z-index:1000
}

header h1{
color:#C6A75E;
letter-spacing:4px;
font-size:32px
}

.subtitulo{
text-align:center;
margin:40px 10px;
font-size:26px;
color:#ddd
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
max-width:1300px;
margin:auto
}

.card{
background:#1a1a1a;
border-radius:16px;
padding:20px;
text-align:center;
border:1px solid rgba(198,167,94,0.2);
transition:.3s;
box-shadow:0 10px 25px rgba(0,0,0,.4)
}

.card:hover{
transform:translateY(-8px);
border-color:#C6A75E
}

.card img{
width:100%;
height:200px;
object-fit:contain;
margin-bottom:15px;
background:#111;
border-radius:10px
}

.puffs{color:#aaa;font-size:14px;margin-bottom:8px}

.precio{
color:#C6A75E;
font-size:20px;
font-weight:bold;
margin-bottom:12px
}

button{
background:#C6A75E;
border:none;
padding:10px 18px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
transition:.2s
}

button:hover{transform:scale(1.05)}

/* SABORES MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
z-index:2000
}

.modal-contenido{
background:#1a1a1a;
padding:30px;
border-radius:14px;
width:360px;
max-height:80vh;
overflow:auto
}

.modal h3{margin-bottom:15px}

.sabor{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid #333
}

.estado{
font-size:13px;
padding:3px 8px;
border-radius:20px
}

.disponible{
background:#1e7f46;
color:#9cffc7
}

.agotado{
background:#6b1e1e;
color:#ff9b9b
}

/* CARRITO */
.carrito{
position:fixed;
top:20px;
right:20px;
background:#C6A75E;
color:black;
padding:12px 16px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,.4)
}

.panel-carrito{
position:fixed;
right:-380px;
top:0;
width:320px;
height:100%;
background:#111;
padding:25px;
transition:.4s;
z-index:1500
}

.panel-carrito h2{margin-bottom:20px}

.item-carrito{
margin-bottom:10px;
font-size:14px;
color:#ddd
}

.total{
margin-top:20px;
font-weight:bold;
color:#C6A75E
}

.comprar{
margin-top:20px;
width:100%
}

.vacio{
color:#777;
font-size:14px
}

</style>
</head>

<body>

<header>
<h1>EKGOLD</h1>
</header>

<div class="carrito" onclick="abrirCarrito()">🛒 <span id="cantidad">0</span></div>

<h2 class="subtitulo">Vapes Disponibles</h2>

<section class="productos" id="contenedor"></section>

<!-- MODAL SABORES -->
<div class="modal" id="modal">
<div class="modal-contenido">
<h3 id="tituloProducto"></h3>
<div id="listaSabores"></div>
<br>
<button onclick="cerrarModal()">Cerrar</button>
</div>
</div>

<!-- PANEL CARRITO -->
<div class="panel-carrito" id="panelCarrito">
<h2>Tu carrito</h2>
<div id="items" class="vacio">Carrito vacío</div>
<div class="total" id="total"></div>
<button class="comprar" onclick="comprar()">Finalizar compra</button>
</div>

<script>

const numero="573106435115";

let carrito=[];

const productos=[

{
nombre:"Lost Mary",
puffs:"5000 puffs",
precio:00,
imagen:"https://i0.wp.com/gleevape.com/wp-content/uploads/2024/06/Lost-Mary-MO5000-1-2.webp?fit=710%2C635&ssl=1",
sabores:[
{nombre:"aràndanos Ice",stock:true},
{nombre:"Mango y Melocotòn",stock:true},
{nombre:"Fresa y Kiwi",stock:false},
{nombre:"sandìa",stock:true}
]
},

{
nombre:"Snoopy",
puffs:"7000 puffs",
precio:00,
imagen:"http://aleko.com.co/cdn/shop/files/image-Photoroom_be096c57-2d63-4f10-a7f4-c2d113bfc7b4.jpg?v=1735910941",
sabores:[
{nombre:"Uva Ice",stock:true},
{nombre:"Melocotòn y Mango",stock:true},
{nombre:"??",stock:false}
]
},

{
nombre:"Priv Bar",
puffs:"15000 puffs",
precio:00,
imagen:"https://images.rappi.com/products/1725758231255_1725758229165_1725758228266.jpeg",
sabores:[
{nombre:"Blue Razz",stock:true},
{nombre:"Menta Limòn",stock:true},
{nombre:"Cereza",stock:false}
]
}

];

const contenedor=document.getElementById("contenedor");

productos.forEach((p,i)=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.imagen}">
<h3>${p.nombre}</h3>
<p class="puffs">${p.puffs}</p>
<p class="precio">$${p.precio}</p>
<button class="btnComprar">Comprar</button>
`;

card.querySelector(".btnComprar").addEventListener("click",()=>{
verSabores(i);
});

contenedor.appendChild(card);

});

function verSabores(i){

const producto=productos[i];

const lista=document.getElementById("listaSabores");
lista.innerHTML="";

document.getElementById("tituloProducto").innerText=producto.nombre;

producto.sabores.forEach(s=>{

const div=document.createElement("div");
div.className="sabor";

const estado=s.stock
?`<span class='estado disponible'>Disponible</span>`
:`<span class='estado agotado'>Agotado</span>`;

const boton=s.stock
?`<button onclick="agregar('${producto.nombre}','${s.nombre}',${producto.precio})">Añadir</button>`
:"";

 div.innerHTML=`
 <span>${s.nombre}</span>
 ${estado}
 ${boton}
 `;

lista.appendChild(div);

});

 document.getElementById("modal").style.display="flex";
}

function cerrarModal(){
document.getElementById("modal").style.display="none";
}

function agregar(prod,sabor,precio){

carrito.push({prod,sabor,precio});
actualizarCarrito();

}

function actualizarCarrito(){

const items=document.getElementById("items");
items.innerHTML="";

let total=0;

if(carrito.length==0){
items.innerHTML="Carrito vacío";
document.getElementById("total").innerText="";
}

carrito.forEach(c=>{

const div=document.createElement("div");
div.className="item-carrito";

div.innerText=`${c.prod} - ${c.sabor} - $${c.precio}`;

items.appendChild(div);

 total+=c.precio;

});

 document.getElementById("cantidad").innerText=carrito.length;
 document.getElementById("total").innerText="Total: $"+total;

}

function abrirCarrito(){

const panel=document.getElementById("panelCarrito");

panel.style.right = panel.style.right=="0px" ? "-380px" : "0px";

}

function comprar(){

if(carrito.length==0){
alert("Tu carrito está vacío");
return;
}

let mensaje="Hola quiero comprar:%0A%0A";

carrito.forEach(c=>{
mensaje+=`${c.prod} - ${c.sabor} - $${c.precio}%0A`;
});

window.open(`https://wa.me/${numero}?text=${mensaje}`);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKvaps</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #0f0f0f;
    color: white;
}

/* HEADER */
header {
    background: black;
    padding: 30px 20px;
    text-align: center;
    border-bottom: 2px solid #C6A75E;
    position: sticky;
    top: 0;
    z-index: 1000;
}

header h1 {
    color: #C6A75E;
    font-size: 36px;
    letter-spacing: 4px;
    font-weight: 600;
}

/* SUBTITLE */
.subtitulo {
    text-align: center;
    margin: 50px 20px 10px;
    font-size: 26px;
    font-weight: 300;
    color: #ddd;
}

/* GRID */
.productos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 35px;
    padding: 40px;
    max-width: 1300px;
    margin: auto;
}

/* CARD */
.card {
    background: #1a1a1a;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    transition: 0.35s;
    border: 1px solid rgba(198,167,94,0.15);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    opacity: 0;
    transform: translateY(30px);
    animation: aparecer 0.6s forwards;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 18px 35px rgba(0,0,0,0.6);
    border-color: rgba(198,167,94,0.5);
}

.card img {
    width: 100%;
    height: 210px;
    object-fit: contain;
    border-radius: 12px;
    background: #111;
    margin-bottom: 15px;
}

.card h3 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 8px;
}

.precio {
    color: #C6A75E;
    font-size: 20px;
    font-weight: bold;
}

/* FOOTER */
footer {
    background: black;
    text-align: center;
    padding: 20px;
    margin-top: 60px;
    border-top: 2px solid #C6A75E;
    font-size: 14px;
    color: #aaa;
}

/* WHATSAPP BUTTON */
.whatsapp {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: #C6A75E;
    color: black;
    padding: 14px 18px;
    border-radius: 50px;
    font-weight: bold;
    text-decoration: none;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    transition: 0.3s;
}

.whatsapp:hover {
    transform: scale(1.08);
}

/* ANIMATION */
@keyframes aparecer {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<header>
    <h1>EKvaps</h1>
</header>

<h2 class="subtitulo">Colección Disponible</h2>

<section class="productos" id="contenedor-productos"></section>

<footer>
    © 2026 EKvaps — Experiencia Premium
</footer>

<a class="whatsapp" href="https://wa.me/573224953782" target="_blank">
    WhatsApp
</a>

<script>
/* ================================
   PRODUCTOS (EDITA AQUÍ)
   ================================ */

const productos = [
    {
        nombre: "Lost Mary",
        precio: "22.000",
        imagen: "https://i0.wp.com/gleevape.com/wp-content/uploads/2024/06/Lost-Mary-MO5000-1-2.webp?fit=710%2C635&ssl=1"
    },
    {
        nombre: "Snoopy",
        precio: "27.000",
        imagen: "http://aleko.com.co/cdn/shop/files/image-Photoroom_be096c57-2d63-4f10-a7f4-c2d113bfc7b4.jpg?v=1735910941"
    },
    {
        nombre: "Priv Bar",
        precio: "35.000",
        imagen: "https://images.rappi.com/products/1725758231255_1725758229165_1725758228266.jpeg"
    }
];

/* ================================
   GENERAR PRODUCTOS
   ================================ */

const contenedor = document.getElementById("contenedor-productos");

productos.forEach((producto, index) => {
    contenedor.innerHTML += `
        <div class="card" style="animation-delay:${index * 0.1}s">
            <img src="${producto.imagen}" alt="${producto.nombre}">
            <h3>${producto.nombre}</h3>
            <p class="precio">$${producto.precio}</p>
        </div>
    `;
});
</script>

</body>
</html>

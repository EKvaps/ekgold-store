```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKGOLD</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#0f0f0f;
color:white;
}

header{
background:black;
padding:25px;
text-align:center;
border-bottom:2px solid #C6A75E;
}

header h1{
color:#C6A75E;
letter-spacing:4px;
font-size:32px;
}

.carrito-btn{
position:fixed;
top:20px;
right:20px;
background:#C6A75E;
color:black;
padding:12px 18px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
z-index:1000;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
max-width:1200px;
margin:auto;
}

.card{
background:#1a1a1a;
border-radius:16px;
padding:20px;
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:contain;
background:#111;
border-radius:10px;
margin-bottom:15px;
}

.precio{
color:#C6A75E;
font-size:20px;
margin:10px 0;
}

button{
background:#C6A75E;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#1a1a1a;
padding:30px;
border-radius:14px;
width:350px;
}

.sabor{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #333;
}

.disponible{color:#63ff9c;}
.agotado{color:#ff6b6b;}

.panel-carrito{
position:fixed;
top:0;
right:-350px;
width:320px;
height:100%;
background:#111;
padding:25px;
transition:.4s;
}

.panel-carrito.abierto{
right:0;
}

.panel-admin{
position:fixed;
top:0;
left:-350px;
width:320px;
height:100%;
background:#111;
padding:25px;
transition:.4s;
overflow:auto;
}

.panel-admin.abierto{
left:0;
}

</style>
</head>

<body>

<header>
<h1>
EKGOL<span onclick="pedirPassword()" style="cursor:pointer;">D</span>
</h1>
</header>

<div class="carrito-btn" id="carritoBtn">
🛒 <span id="cantidad">0</span>
</div>

<section class="productos" id="productos"></section>

<!-- MODAL SABORES -->

<div class="modal" id="modal">
<div class="modal-box">

<h3 id="titulo"></h3>
<div id="sabores"></div>

<br>
<button onclick="cerrarModal()">Cerrar</button>

</div>
</div>

<!-- CARRITO -->

<div class="panel-carrito" id="panelCarrito">

<h2>Carrito</h2>

<div id="listaCarrito">Vacío</div>

<div id="total"></div>

<br>

<button onclick="comprar()">Finalizar compra</button>

</div>

<!-- PANEL ADMIN -->

<div class="panel-admin" id="panelAdmin">

<h2>Panel de Stock</h2>

<div id="adminStock"></div>

<br>

<button onclick="guardarStock()">Guardar</button>

</div>

<script>

const numero="573106435115"

let carrito=[]

const productos=[

{
nombre:"Lost Mary",
precio:45000,
imagen:"https://i0.wp.com/gleevape.com/wp-content/uploads/2024/06/Lost-Mary-MO5000-1-2.webp",
sabores:[
{nombre:"Arándanos Ice",stock:true},
{nombre:"Mango",stock:true},
{nombre:"Fresa Kiwi",stock:false}
]
},

{
nombre:"Snoopy",
precio:50000,
imagen:"http://aleko.com.co/cdn/shop/files/image-Photoroom_be096c57-2d63-4f10-a7f4-c2d113bfc7b4.jpg",
sabores:[
{nombre:"Uva Ice",stock:true},
{nombre:"Melocotón",stock:true}
]
}

]

const cont=document.getElementById("productos")

productos.forEach((p,i)=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${p.imagen}">

<h3>${p.nombre}</h3>

<div class="precio">$${p.precio}</div>

<button onclick="verSabores(${i})">Comprar</button>

`

cont.appendChild(card)

})

function verSabores(i){

const prod=productos[i]

document.getElementById("titulo").innerText=prod.nombre

const lista=document.getElementById("sabores")

lista.innerHTML=""

prod.sabores.forEach(s=>{

let estado=s.stock
?'<span class="disponible">Disponible</span>'
:'<span class="agotado">Agotado</span>'

let boton=s.stock
?`<button onclick="agregar('${prod.nombre}','${s.nombre}',${prod.precio})">Añadir</button>`
:''

lista.innerHTML+=`

<div class="sabor">

<span>${s.nombre}</span>

${estado}

${boton}

</div>

`

})

document.getElementById("modal").style.display="flex"

}

function cerrarModal(){
document.getElementById("modal").style.display="none"
}

function agregar(prod,sabor,precio){

carrito.push({prod,sabor,precio})

actualizarCarrito()

}

function actualizarCarrito(){

const lista=document.getElementById("listaCarrito")

lista.innerHTML=""

let total=0

carrito.forEach(c=>{

lista.innerHTML+=`<div>${c.prod} - ${c.sabor} - $${c.precio}</div>`

total+=c.precio

})

document.getElementById("cantidad").innerText=carrito.length

document.getElementById("total").innerText="Total: $"+total

}

document.getElementById("carritoBtn").onclick=()=>{

document.getElementById("panelCarrito").classList.toggle("abierto")

}

function comprar(){

if(carrito.length==0){

alert("Carrito vacío")

return

}

let mensaje="Hola quiero comprar:%0A"

carrito.forEach(c=>{

mensaje+=`${c.prod} - ${c.sabor} - $${c.precio}%0A`

})

window.open(`https://wa.me/${numero}?text=${mensaje}`)

}

/* PANEL ADMIN */

function pedirPassword(){

let pass=prompt("Contraseña administrador")

if(pass==="3122714284"){

abrirPanelAdmin()

}else{

alert("Contraseña incorrecta")

}

}

function abrirPanelAdmin(){

const panel=document.getElementById("panelAdmin")

panel.classList.toggle("abierto")

cargarAdmin()

}

function cargarAdmin(){

const cont=document.getElementById("adminStock")

cont.innerHTML=""

productos.forEach((p,pi)=>{

p.sabores.forEach((s,si)=>{

cont.innerHTML+=`

${p.nombre} - ${s.nombre}

<select id="stock_${pi}_${si}">

<option value="true" ${s.stock?"selected":""}>Disponible</option>

<option value="false" ${!s.stock?"selected":""}>Agotado</option>

</select>

<br><br>

`

})

})

}

function guardarStock(){

productos.forEach((p,pi)=>{

p.sabores.forEach((s,si)=>{

let valor=document.getElementById(`stock_${pi}_${si}`).value

s.stock=(valor=="true")

})

})

alert("Stock actualizado")

}

</script>

</body>
</html>
```
